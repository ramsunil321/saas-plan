# =============================================================================
# NGINX REVERSE PROXY — Routes all traffic for FlowForge
# =============================================================================
#
# WHAT IS A REVERSE PROXY?
#   Clients connect to nginx (the public entry point).
#   Nginx forwards requests to the appropriate backend service.
#   Clients never connect directly to backend services.
#
# BENEFITS:
#   1. Single port (80/443) for the entire platform
#   2. TLS termination — SSL handled once here, not in each service
#   3. Load balancing — route to multiple instances of a service
#   4. Rate limiting — protect backends from abuse at the edge
#   5. Request buffering — nginx buffers slow client uploads
#   6. Static file serving — can serve frontend assets directly
#
# ROUTING STRATEGY (path-based routing):
#   All API requests go to /api/v1/ — nginx examines the path and routes to
#   the appropriate microservice. The frontend is the catch-all (/).
#
# LOCATION BLOCK PRIORITY (nginx match order):
#   1. Exact match: location = /path
#   2. Longest prefix match: location /path/
#   3. Regex match: location ~ regex  (case-sensitive)
#   4. Regex match: location ~* regex (case-insensitive)
#   The TASK SERVICE REGEX must be declared BEFORE the workspace prefix block
#   because task routes share the /api/v1/organizations/ prefix with workspace.
#
# INTERVIEW QUESTION: "How does nginx route between microservices?"
#   Answer: Location blocks match incoming URL paths. More specific rules
#   take priority. Regex blocks (location ~ ...) are evaluated in declaration
#   order. Nginx proxies the matched request to the upstream service via
#   proxy_pass, setting appropriate headers to preserve client info.
# =============================================================================

# Number of worker processes — "auto" = one per CPU core
worker_processes auto;

events {
  # Maximum simultaneous connections per worker
  # 1024 is a safe default; increase to 4096+ for high-traffic production
  worker_connections 1024;
}

http {
  # =============================================================================
  # UPSTREAM BLOCKS — Service discovery (container names resolve via Docker DNS)
  # =============================================================================
  # Docker Compose creates a bridge network where service names resolve to
  # container IPs automatically. nginx uses these names for upstream routing.
  # keepalive: reuse TCP connections to upstreams (avoids 3-way handshake cost)
  # =============================================================================

  upstream auth_service {
    server auth-service:3001;
    keepalive 32;
  }

  upstream workspace_service {
    server workspace-service:3002;
    keepalive 32;
  }

  upstream task_service {
    server task-service:3003;
    keepalive 32;
  }

  upstream notification_service {
    server notification-service:3004;
    keepalive 32;
  }

  upstream frontend {
    server frontend:3000;
    keepalive 16;
  }

  # =============================================================================
  # PROXY DEFAULTS — Applied to all proxy_pass blocks
  # =============================================================================

  # Pass the original client IP to backend services (for logging/rate limiting)
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  # Forward the original Host header (used by CORS and absolute URL generation)
  proxy_set_header Host              $host;

  # Use HTTP/1.1 for keepalive connections to upstreams
  proxy_http_version 1.1;
  # Required for HTTP/1.1 keepalive
  proxy_set_header Connection        "";

  # Timeouts — adjust based on your slowest operation
  proxy_connect_timeout 10s;   # Connect to upstream
  proxy_send_timeout    60s;   # Send request to upstream
  proxy_read_timeout    60s;   # Wait for upstream response

  # Buffer upstream responses in nginx before sending to client
  # Prevents slow-client stalls from tying up backend connections
  proxy_buffering    on;
  proxy_buffer_size  8k;
  proxy_buffers      8 8k;

  # =============================================================================
  # LOGGING
  # =============================================================================
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'upstream="$upstream_addr" rt=$request_time';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # Disable sending nginx version in response headers (security hardening)
  server_tokens off;

  # =============================================================================
  # GZIP COMPRESSION — Reduces payload size for text responses
  # =============================================================================
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;            # Don't compress tiny responses
  gzip_types
    text/plain text/css text/xml
    application/json application/javascript application/xml
    application/rss+xml image/svg+xml;

  # =============================================================================
  # MAIN SERVER BLOCK — Port 80
  # =============================================================================
  server {
    listen 80;
    server_name _;   # Match any hostname (replace with your domain in production)

    # Max request body size — must be at least as large as task-service MAX_FILE_SIZE_MB
    client_max_body_size 25M;

    # ----------------------------------------------------------------
    # HEALTH CHECK — Used by load balancers and monitoring
    # ----------------------------------------------------------------
    location = /health {
      return 200 '{"status":"ok","service":"nginx"}';
      add_header Content-Type application/json;
      access_log off;   # Don't log health check polls (very noisy)
    }

    # ----------------------------------------------------------------
    # AUTH SERVICE  →  /api/v1/auth/*
    # ----------------------------------------------------------------
    location /api/v1/auth {
      proxy_pass http://auth_service;
    }

    # ----------------------------------------------------------------
    # NOTIFICATION SERVICE  →  /api/v1/notifications/*
    # ----------------------------------------------------------------
    location /api/v1/notifications {
      proxy_pass http://notification_service;
    }

    # ----------------------------------------------------------------
    # TASK SERVICE  →  /api/v1/organizations/*/projects/*/tasks*
    # ----------------------------------------------------------------
    # MUST be declared BEFORE the workspace block below.
    # Reason: Both task-service and workspace-service mount routes under
    # /api/v1/organizations/. The regex distinguishes task routes by the
    # presence of "/tasks" (or adjacent paths) after the project segment.
    # ----------------------------------------------------------------
    location ~ ^/api/v1/organizations/[^/]+/projects/[^/]+/tasks {
      proxy_pass http://task_service;
    }

    # ----------------------------------------------------------------
    # WORKSPACE SERVICE  →  /api/v1/organizations/*
    # ----------------------------------------------------------------
    # Catches all remaining /organizations/ routes (orgs, teams, projects, boards)
    # ----------------------------------------------------------------
    location /api/v1/organizations {
      proxy_pass http://workspace_service;
    }

    # ----------------------------------------------------------------
    # FRONTEND  →  everything else (Next.js app)
    # ----------------------------------------------------------------
    # Next.js uses trailing slashes and dynamic routes — proxy all to it
    location / {
      proxy_pass http://frontend;

      # Required for Next.js WebSocket HMR in development
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
